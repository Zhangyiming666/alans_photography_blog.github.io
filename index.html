<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#edf3f6" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0c141b" />
    <title>Alan's Photography Blog</title>
    <meta
      name="description"
      content="Alan's Photography Blog"
    />
    <link rel="stylesheet" href="./styles.css?v=20260327-1904" />
  </head>
  <body>
    <div class="page-shell">
      <main id="top">
        <section class="story-cover reveal" id="coverStory">
          <div class="story-cover-shell">
            <div class="story-cover-backdrop" id="storyBackdrop" aria-hidden="true"></div>

            <div class="story-stage" id="storyStage">
              <div class="story-glass-card">
                <h1>Welcome to Alan's<br />Photography Blog</h1>
                <a class="story-enter" href="#atlas">Stroll to Explore</a>
              </div>
            </div>
          </div>
        </section>

        <section class="atlas reveal" id="atlas">
          <div class="atlas-layout">
            <div class="map-stage">
              <div class="map-toolbar map-toolbar-top" aria-label="地图导航">
                <button class="map-control map-control-wide" id="backButton">返回上一级</button>
                <button class="map-control map-control-wide" id="resetViewButton">重置地图</button>
              </div>
              <div class="map-status" id="mapStatus">正在加载全国行政区数据…</div>
              <div class="map-toolbar map-toolbar-zoom" aria-label="地图缩放">
                <button class="map-control map-control-icon" id="zoomOutButton" aria-label="缩小">-</button>
                <button class="map-control map-control-icon" id="zoomInButton" aria-label="放大">+</button>
              </div>
              <div class="real-map" id="chinaMap" aria-label="中国行政区摄影地图"></div>
            </div>

            <aside class="region-panel">
              <div class="breadcrumb" id="breadcrumb"></div>

              <div class="region-panel-header">
                <h3 id="areaTitle">中国</h3>
              </div>

              <div class="region-panel-body">
                <div class="region-gallery" id="regionGallery"></div>
                <nav class="region-timeline" id="regionTimeline" aria-label="相册快速索引" hidden></nav>
              </div>
            </aside>
          </div>
        </section>

        <section class="atlas tag-atlas reveal" id="tagAtlas">
          <div class="tag-atlas-shell">
            <div class="section-heading tag-atlas-heading">
              <h2>View by Tag</h2>
            </div>

            <div class="tag-atlas-filter" id="tagFilter" aria-label="按标签筛选"></div>
            <div class="tag-atlas-summary" id="tagSummary"></div>
            <div class="tag-atlas-gallery" id="tagAtlasGallery"></div>
          </div>
        </section>
      </main>
    </div>

    <div class="lightbox" aria-hidden="true">
      <button class="lightbox-backdrop" aria-label="关闭预览"></button>
      <div class="lightbox-dialog" role="dialog" aria-modal="true" aria-label="作品预览">
        <button class="lightbox-close" aria-label="关闭预览">×</button>
        <img class="lightbox-image" src="" alt="" />
        <div class="lightbox-copy">
          <p class="lightbox-meta"></p>
          <p class="lightbox-gear"></p>
          <div class="tag-rail lightbox-photo-tags"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="./data/catalog/index.js?v=20260327-0055"></script>
    <script src="./script.js?v=20260327-1948"></script>
  </body>
</html>
